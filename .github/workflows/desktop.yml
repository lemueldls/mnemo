name: "Reusable desktop tauri build workflow"

on:
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ""
      tagName:
        required: false
        type: string
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            symbol: 🐧
            platform: Linux
            container_image: ghcr.io/lemueldls/mnemo-ubuntu-builder:latest
          - os: "macos-latest"
            args: "--target universal-apple-darwin"
            symbol: 🍏
            platform: macOS
          - os: "windows-latest"
            symbol: 🪟
            platform: Windows

    name: ${{ matrix.symbol }}🔨
    runs-on: ${{ matrix.os }}
    container: ${{ contains(matrix.os, 'ubuntu') && matrix.container_image || null }}
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📝 Extract version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          CURRENT_VERSION=$(jq -r '.version' platform/tauri/tauri.conf.json)
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: 🛡️ Verify tag matches version in tauri config (publish only)
        if: inputs.tagName
        shell: bash
        run: |
          CURRENT_VERSION=${{ steps.get-version.outputs.current-version }}
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" != *"$CURRENT_VERSION" ]]
          then
            echo "The tag name ${TAG} does not match the version ${CURRENT_VERSION} from tauri config"
            exit 1
          fi

      - name: 🦀🚀
        uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown' || 'wasm32-unknown-unknown' }}

      # - name: 🔑 Import windows signing certificate (windows only)
      #   if: contains(matrix.os, 'windows')
      #   env:
      #     WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      #     WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      #   run: |
      #     New-Item -ItemType directory -Path certificate
      #     Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
      #     certutil -decode certificate/tempCert.txt certificate/certificate.pfx
      #     Remove-Item -path certificate -include tempCert.txt
      #     Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: 🌙 Setup Moon
        uses: ./.github/actions/setup-moon

      - name: 🔨 Build plain executables using tauri action (publish artifacts on release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        if: ${{ !contains(matrix.os, 'macos') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tagName }}
          releaseDraft: false
          prerelease: false
          assetNamePattern: "[name]_[version]_[arch][ext]"
          args: ${{ matrix.args }} --no-bundle
          retryAttempts: 1
          uploadPlainBinary: true

      - name: 🔨 Build bundles using tauri action (publish artifacts on release)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          updaterJsonPreferNsis: true
          tagName: ${{ inputs.tagName }}
          releaseDraft: false
          prerelease: false
          assetNamePattern: "[name]_[version]_[arch][ext]"
          args: ${{ matrix.args }}
          retryAttempts: 1

      - name: 📤 Upload build artifacts (push or pr builds only)
        if: (!inputs.tagName)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "bundles-${{matrix.os}}${{matrix.args}}"
          path: |
            platform/target/**/release/bundle
            platform/target/**/release/mnemo*

      - name: 🛡️ Attest build provenance (publish release only)
        if: inputs.tagName
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            platform/target/release/bundle/nsis/*
            platform/target/**/release/bundle/macos/*.tar.gz*
            platform/target/**/release/bundle/dmg/*.dmg
            platform/target/release/bundle/deb/*.deb
            platform/target/release/bundle/rpm/*.rpm
            platform/target/**/release/mnemo
            platform/target/release/mnemo.exe
