name: Deploy Cloudflare Workers

on:
  push:
    paths:
      - app/**
      - server/**
      - modules/**
      - shared/**
      - i18n/**
      - public/**
      - platform/wasm/**
      - .moon/**
      - moon.yml
      - nuxt.config.ts
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - wrangler.toml
      - .github/workflows/deploy.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose an environment to deploy to: <dev|staging|prod>"
        required: true
        default: "dev"

jobs:
  deploy:
    name: ☁️ Deploy Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🦀 Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          targets: wasm32-unknown-unknown

      - name: 🌙 Setup Moon
        uses: ./.github/actions/setup-moon

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build web app
        run: pnpm build
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.ref_name }}" in
              main) echo "environment=prod" >> $GITHUB_OUTPUT ;;
              staging) echo "environment=staging" >> $GITHUB_OUTPUT ;;
              *) echo "environment=dev" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: 🗄️ Apply D1 migrations (Production)
        if: ${{ steps.env.outputs.environment == 'prod' }}
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply DB --remote --config .output/server/wrangler.json
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Deploy to Cloudflare Workers (Production)
        if: ${{ steps.env.outputs.environment == 'prod' }}
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ steps.env.outputs.environment }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}

      - name: 🚀 Deploy to Cloudflare Workers (Preview)
        if: ${{ steps.env.outputs.environment != 'prod' }}
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --env ${{ steps.env.outputs.environment }} --preview-alias ${{ steps.env.outputs.environment }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}
