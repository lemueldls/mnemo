name: Void Linux XBPS Package

on:
  workflow_call:
    inputs:
      tagName:
        description: "The tag name of the release to publish to"
        required: false
        type: string
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  XBPS_ALLOW_RESTRICTED: yes
  XBPS_CHROOT_CMD: ethereal
  XBPS_ALLOW_CHROOT_BREAKOUT: yes

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/lemueldls/mnemo-void-package-builder:latest
    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 🔄 Clone Void Packages and binary bootstrap
        shell: bash
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages.git ~/void-packages
          cd ~/void-packages
          ln -s / masterdir
          mkdir -p hostdir
          ./xbps-src binary-bootstrap
          mv /root/.cargo hostdir/
          mv /root/.rustup hostdir/

      - name: 📝 Extract version from latest release
        if: (!inputs.tagName)
        id: get-version-release
        uses: ./.github/actions/latest-release-info

      - name: 📝 Extract version from tauri config
        if: inputs.tagName
        id: get-version-config
        run: |
          CURRENT_VERSION=$(jq -r '.version' platform/tauri/tauri.conf.json)
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: 📝 Normalize version output
        id: get-version
        run: |
          VERSION="${{ steps.get-version-config.outputs.version || steps.get-version-release.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔢 Get Source Tarball Checksum
        id: get-checksum
        shell: bash
        run: |
          URL="https://github.com/lemueldls/mnemo/archive/refs/tags/mnemo-v${{ steps.get-version.outputs.version }}.tar.gz"
          echo "getting $URL"
          SUM=$(curl -LfsS "$URL" | sha256sum | cut -f1 -d ' ')
          echo "sha256=$SUM" >> $GITHUB_OUTPUT

      - name: 🌀  Generate template
        shell: bash
        run: |
          mkdir -p ~/void-packages/srcpkgs/mnemo
          bash platform/void/generate-template.sh \
            "${{ steps.get-version.outputs.version }}" \
            "${{ steps.get-checksum.outputs.sha256 }}" \
            > ~/void-packages/srcpkgs/mnemo/template

      - name: 📐 Lint generated template
        run: |
          cd ~/void-packages
          xlint srcpkgs/mnemo/template
          ./xbps-src -I fetch mnemo

      - name: ➕ Add Custom build-style to void packages
        if: inputs.tagName
        run: |
          cp "$GITHUB_WORKSPACE/platform/void/tauri.sh" ~/void-packages/common/build-style/

      - name: 🔨 Build Package
        if: inputs.tagName
        run: |
          cd ~/void-packages
          ./xbps-src pkg mnemo

      - name: 🔑 Sign repository and package
        if: inputs.tagName
        run: |
          cd ~/void-packages
          echo "${{ secrets.XBPS_REPOSITORY_SIGNING_KEY }}" > private.pem
          xbps-rindex --privkey private.pem --sign --signedby "void@lemueldls.dev" hostdir/binpkgs
          xbps-rindex --privkey private.pem --sign-pkg hostdir/binpkgs/*.xbps

      - name: 🛡️ Attest build provenance (publish release only)
        if: inputs.tagName
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ~/void-packages/hostdir/binpkgs/*

      - name: 🚀 Publish
        if: inputs.tagName
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Mnemo Release v${{ steps.get-version.outputs.version }}
          append_body: true
          make_latest: false
          generate_release_notes: false
          files: |
            ~/void-packages/hostdir/binpkgs/mnemo-${{ steps.get-version.outputs.version }}_1.x86_64.xbps
