version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  # - package-ecosystem: "npm"
  #   directory: "/"
  #   schedule:
  #     interval: "monthly"
  #   cooldown:
  #     default-days: 7

  # - package-ecosystem: "cargo"
  #   directory: "/platform"
  #   schedule:
  #     interval: "monthly"
  #   cooldown:
  #     default-days: 7

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directories:
      - "/.github/docker/*"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
