name: Setup Moon
description: Sets up pnpm, Node.js, and Moon build cache

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"

runs:
  using: "composite"
  steps:
    - name: 📥 Install pnpm
      uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

    - name: 📥 Install Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: 💾 Restore Moon cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          .moon/cache/hashes
          .moon/cache/outputs
        key: ${{ runner.os }}-moon-${{ hashFiles('.moon/**/*.yml', 'moon.yml', 'platform/**/moon.yml', 'package.json', 'pnpm-lock.yaml', 'nuxt.config.ts', 'wrangler.toml', 'platform/Cargo.toml', 'platform/Cargo.lock', 'platform/tauri/Cargo.toml', 'platform/wasm/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-moon-
