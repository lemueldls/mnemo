name: Setup moon
description: Sets up pnpm, Node.js, and moon build cache

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24"

runs:
  using: "composite"
  steps:
    - name: 📥 Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        cache: true

    - name: 📥 Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"

    - name: 💾 Restore moon cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          .moon/cache/hashes
          .moon/cache/outputs
        key: ${{ runner.os }}-moon-${{ hashFiles('.moon/**/*.yml', 'moon.yml', 'platform/**/moon.yml', 'package.json', 'pnpm-lock.yaml', 'nuxt.config.ts', 'wrangler.toml', 'platform/Cargo.toml', 'platform/Cargo.lock', 'platform/tauri/Cargo.toml', 'platform/wasm/Cargo.toml') }}
        restore-keys: |
          ${{ runner.os }}-moon-
