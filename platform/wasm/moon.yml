language: "rust"
stack: "systems"
layer: "library"

tasks:
  build-dev:
    command: "pnpm wasm-pack build -t web platform/wasm --no-opt --features wasm-simd"
    options:
      runFromWorkspaceRoot: true
    inputs:
      - "Cargo.toml"
      - "src/**/*"
      - "build.rs"
      - "tests/**/*"
      - "/platform/Cargo.toml"
      - "/platform/Cargo.lock"
    outputs:
      - "pkg/**/*"

  build:
    command: "pnpm wasm-pack build -t web platform/wasm --release --features wasm-simd"
    options:
      runFromWorkspaceRoot: true
    inputs:
      - "Cargo.toml"
      - "src/**/*"
      - "build.rs"
      - "tests/**/*"
      - "/platform/Cargo.toml"
      - "/platform/Cargo.lock"
    outputs:
      - "pkg/**/*"
