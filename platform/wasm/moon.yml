language: "rust"
stack: "systems"
layer: "library"

tasks:
  build-dev:
    command: "wasm-pack build -t web --no-opt --features wasm-simd"
    inputs:
      - "Cargo.toml"
      - "src/**/*"
      - "build.rs"
      - "tests/**/*"
      - "/platform/Cargo.toml"
      - "/platform/Cargo.lock"
    outputs:
      - "pkg/**/*"

  build:
    command: "wasm-pack build -t web --release --features wasm-simd"
    inputs:
      - "Cargo.toml"
      - "src/**/*"
      - "build.rs"
      - "tests/**/*"
      - "/platform/Cargo.toml"
      - "/platform/Cargo.lock"
    outputs:
      - "pkg/**/*"
